<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İbrahim TV | Ana Sayfa</title>
    <style>
        body { 
            background-color: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0;
        }
        header { 
            background-color: #202020; 
            padding: 20px; 
            text-align: center; 
            border-bottom: 3px solid #ff0000; /* İbrahim TV Kırmızısı */
        }
        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .video-box { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; letter-spacing: 2px; }
        footer { margin-top: 50px; font-size: 0.8em; color: #888; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>İBRAHİM <span style="color: #ff0000;">TV</span></h1>
</header>

<div class="container">
    <h2>Günün Videosu</h2>
    <div class="video-box">
        <!-- Buraya YouTube'dan aldığın "Yerleştirme" (Embed) kodunu koyacaksın -->
        <iframe width="720" height="405" src="https://www.youtube.com/embed/ÖrnekVideoKodu" frameborder="0" allowfullscreen></iframe>
    </div>
    <p>İbrahim TV'ye hoş geldiniz! Burada en yeni içerikleri bulabilirsiniz.</p>
</div>

<footer>
    © 2026 İbrahim TV - Tüm Hakları Saklıdır.
</footer>

</body>
</html>
